            - {type: ConvertPILImage, dtype: 'float32', scale: True}
            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: LoadText,}
      DIOR:
        type: HF_DetDataset
        img_root: ../datasets/OTA-Det/Detection/LAE-Dataset/LAE-FOD/DIOR/images
        ann_file: ../datasets/OTA-Det/Detection/LAE-Dataset/LAE-FOD/DIOR/DIOR_val_remap.json
        
        attributes_align_use: False
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800], }
