task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: -1  # 消除num_classes参数依赖，DN采用embeddings_dn_sim
remap_mscoco_category: False


# LAE-1M的数据集类别都是从1开始的，测试的时候需要映射一下 note:我直接修改了json文件映射，从0开始 
train_dataloader: 
  type: DataLoader
  dataset:
    type: ConcatDataset
    datasets_list: 
      DOTAv2:
        type: HF_DetDataset
        img_root: ../datasets/OTA-Det/Detection/LAE-Dataset/LAE-FOD/DOTAv2/images
        ann_file: ../datasets/OTA-Det/Detection/LAE-Dataset/LAE-FOD/DOTAv2/processed_LAE-1M_DOTAv2_train_remap.json
        
        attributes_align_use: False
        transforms:
          type: Compose
          ops:
            - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
                probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
            - {type: RandomPhotometricDistort, p: 0.5}
            - {type: RandomZoomOut, fill: 0} 
            - {type: RandomIoUCrop, p: 0.8} 
            - {type: SanitizeBoundingBoxes, min_size: 1}
            - {type: RandomHorizontalFlip} 
            - {type: Resize, size: [800, 800], }
            - {type: SanitizeBoundingBoxes, min_size: 1}
            - {type: ConvertPILImage, dtype: 'float32', scale: True}
            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
            - {type: RandomLoadCaptions_Det, num_neg_samples: [60,60], max_num_samples: 60, padding_to_max: True,}
          policy:
            name: stop_epoch
            epoch: [4, 49, 90]   # list
            ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
          mosaic_prob: 0.5
      DIOR:
