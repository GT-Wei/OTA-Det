            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: LoadText,}
  collate_fn:
    type: BatchImageCollateFunction
  shuffle: False
  total_batch_size: 64
  num_workers: 8
  drop_last: False
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4
