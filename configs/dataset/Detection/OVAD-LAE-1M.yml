  collate_fn:
    type: BatchImageCollateFunction
    base_size: 800
    base_size_repeat: 6
    stop_epoch: 90
    ema_restart_decay: 0.9999
    # mixup_prob: 0.0
    # mixup_epochs: [0, 0]
    # copyblend_prob: 0.0
    # copyblend_epochs: [0, 0]
    mixup_prob: 0.5
    mixup_epochs: [4, 49]
    copyblend_prob: 0.5
    copyblend_epochs: [4, 90]
    area_threshold: 100
    num_objects: 3
    with_expand: True
    expand_ratios: [0.1, 0.25]
    caption_merge_cfg:
      max_num_captions: 60
      num_neg_samples: [60, 60]
      padding_to_max: True
      padding_value: ''
      debug_caption_vis: False
      debug_caption_vis_max: 2
      debug_caption_vis_save: ./vis_caption_debug/

  shuffle: True
  total_batch_size: 32 # total batch size equals to 32 (4 * 8)
  num_workers: 8
  drop_last: True 
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4


val_dataloader:
  type: DataLoader
  dataset: 
    type: ConcatDataset
    datasets_list: 
      LAE-80C:
        type: HF_DetDataset
        img_root: ../datasets/OTA-Det/Detection/LAE-80C/images
        ann_file: ../datasets/OTA-Det/Detection/LAE-80C/LAE-80C-benchmark-remap.json
        
        attributes_align_use: False
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800], }
            - {type: ConvertPILImage, dtype: 'float32', scale: True}
            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: LoadText,}
      DOTAv2:
        type: HF_DetDataset
        img_root: ../datasets/OTA-Det/Detection/LAE-Dataset/LAE-FOD/DOTAv2/images
