task: detection

evaluator:
  - type: GroundingEvaluator
    iou_types: ['bbox']
    max_dets: [1,5,10,100]
  - type: GroundingEvaluator
    iou_types: ['bbox']
    max_dets: [1,5,10,100]

num_classes: -1  # 避免参数生效
remap_mscoco_category: False

train_dataloader: 
  type: DataLoader
  dataset: 
    type: HF_VGDataset
    img_root: ../datasets/OTA-Det/Grounding/images/AerialVG
    ann_file: ../datasets/OTA-Det/Grounding/annotations/AerialVG_train
    attributes_align_use: True
    transforms:
      type: Compose
      ops:
        # 关闭 Mosaic 
        # - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
        #    probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        # - {type: RandomZoomOut, fill: 0} 关闭 ZoomOut（改变位置关系）size大小
        # - {type: RandomIoUCrop, p: 0.8} 关闭 RandomIoUCrop（可能裁掉目标） size大小
        - {type: SanitizeBoundingBoxes_Grounding, min_size: 1}
        # - {type: RandomHorizontalFlip} 关闭水平翻转（left/right会反转）
        - {type: Resize, size: [800, 800], }
        - {type: SanitizeBoundingBoxes_Grounding, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
        - {type: RandomLoadCaptions, max_num_samples: 30, max_attrs_per_caption: 10, padding_to_max: True, random_sample_positive: True, attributes_align_use: True}
      policy:
        name: stop_epoch
        epoch: [4, 49, 90]   # list
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.0
  collate_fn:
    type: BatchImageCollateFunction
    base_size: 800
    base_size_repeat: 6
    stop_epoch: 90
    ema_restart_decay: 0.9999
    mixup_prob: 0.0
    mixup_epochs: [0, 0]
    copyblend_epochs: [0, 0]
  shuffle: True
  total_batch_size: 32 # total batch size equals to 32 (4 * 8)
  num_workers: 8
  drop_last: True 
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4


val_dataloader:
  type: DataLoader
  dataset: 
    type: ConcatDataset
    datasets_list: 
      AerialVG_val:
        type: HF_VGDataset
        img_root: ../datasets/OTA-Det/Grounding/images/AerialVG
        ann_file: ../datasets/OTA-Det/Grounding/annotations/AerialVG_val
        attributes_align_use: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800], }
            - {type: ConvertPILImage, dtype: 'float32', scale: True}
            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: LoadCaptionAttr_Grounding, max_num_captions: 1, max_attrs_per_caption: 10, padding_to_max: True, attributes_align_use: True}
      AerialVG_test:
        type: HF_VGDataset
        img_root: ../datasets/OTA-Det/Grounding/images/AerialVG
        ann_file: ../datasets/OTA-Det/Grounding/annotations/AerialVG_test
        attributes_align_use: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800], }
            - {type: ConvertPILImage, dtype: 'float32', scale: True}
            - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
            - {type: LoadCaptionAttr_Grounding, max_num_captions: 1, max_attrs_per_caption: 10, padding_to_max: True, attributes_align_use: True}
  collate_fn:
    type: BatchImageCollateFunction
  shuffle: False
  total_batch_size: 64
  num_workers: 8
  drop_last: False
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4
